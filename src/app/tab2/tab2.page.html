<ion-header>
  <ion-toolbar>
    <ion-title>Fixtures</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div *ngIf="isLoading" style="display:flex; justify-content:center; margin-top:2rem;">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <ion-list *ngIf="!isLoading">
    <ion-item *ngFor="let item of fixtures" lines="full">
      <ion-thumbnail slot="start">
        <img [src]="item.image" alt="fixture image"/>
      </ion-thumbnail>
      <ion-label>
        <h2>{{ item.title }}</h2>
        <p>{{ item.source.name }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
